<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KraftPad — Trackpad Pad Controller for Mac</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070708;
      --surface: #0f0f11;
      --border: rgba(255,255,255,0.055);
      --text: #ececec;
      --muted: rgba(255,255,255,0.5);
      --accent: #59a6ff;
      --accent-dim: rgba(89,166,255,0.12);

      --p-r0c0: #4b32dc;
      --p-r0c1: #235af0;
      --p-r0c2: #1982fa;
      --p-r0c3: #0faff0;
      --p-r0c4: #0ac8e6;
      --p-r1c0: #a023d7;
      --p-r1c1: #d223aa;
      --p-r1c2: #f0326e;
      --p-r1c3: #fa4b4b;
      --p-r1c4: #ff6428;
      --p-r2c0: #d22332;
      --p-r2c1: #f05014;
      --p-r2c2: #ff8c00;
      --p-r2c3: #dcb400;
      --p-r2c4: #b4d200;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 1000;
    }

    #glitter {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }

    nav.scrolled {
      background: rgba(7,7,8,0.85);
      backdrop-filter: blur(16px);
      border-color: var(--border);
    }

    .logo {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav .nav-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    nav .nav-link:hover { color: var(--text); }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    .hero-glow {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 100vw);
      height: 400px;
      background: radial-gradient(ellipse, rgba(89,166,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s ease forwards 0.2s;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(48px, 9vw, 88px);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s ease forwards 0.35s;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.7;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #050510;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .badge:hover { background: #7fbcff; transform: translateY(-1px); }

    .mac-only {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .grid-wrap {
      width: 100%;
      max-width: 860px;
      margin: 0 auto 120px;
      padding: 0 24px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s ease forwards 0.8s;
    }

    .grid-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-label::before, .grid-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .pad-grid {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      aspect-ratio: 5/3;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 120px rgba(89,166,255,0.05);
    }

    .pad {
      border-radius: 6px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.08s ease;
    }

    .pad::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      border-radius: 6px;
      transition: opacity 0.06s;
    }

    .pad.hit::after { opacity: 0.35; }
    .pad.hit { transform: scale(0.96); }

    .pad-inner {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      opacity: 0.7;
      transition: opacity 0.15s, box-shadow 0.15s;
    }

    .pad:hover .pad-inner { opacity: 0.9; }
    .pad.hit .pad-inner { opacity: 1; box-shadow: var(--pad-glow); }

    .pad.r0c0 .pad-inner { background: var(--p-r0c0); --pad-glow: 0 0 24px var(--p-r0c0); }
    .pad.r0c1 .pad-inner { background: var(--p-r0c1); --pad-glow: 0 0 24px var(--p-r0c1); }
    .pad.r0c2 .pad-inner { background: var(--p-r0c2); --pad-glow: 0 0 24px var(--p-r0c2); }
    .pad.r0c3 .pad-inner { background: var(--p-r0c3); --pad-glow: 0 0 24px var(--p-r0c3); }
    .pad.r0c4 .pad-inner { background: var(--p-r0c4); --pad-glow: 0 0 24px var(--p-r0c4); }
    .pad.r1c0 .pad-inner { background: var(--p-r1c0); --pad-glow: 0 0 24px var(--p-r1c0); }
    .pad.r1c1 .pad-inner { background: var(--p-r1c1); --pad-glow: 0 0 24px var(--p-r1c1); }
    .pad.r1c2 .pad-inner { background: var(--p-r1c2); --pad-glow: 0 0 24px var(--p-r1c2); }
    .pad.r1c3 .pad-inner { background: var(--p-r1c3); --pad-glow: 0 0 24px var(--p-r1c3); }
    .pad.r1c4 .pad-inner { background: var(--p-r1c4); --pad-glow: 0 0 24px var(--p-r1c4); }
    .pad.r2c0 .pad-inner { background: var(--p-r2c0); --pad-glow: 0 0 24px var(--p-r2c0); }
    .pad.r2c1 .pad-inner { background: var(--p-r2c1); --pad-glow: 0 0 24px var(--p-r2c1); }
    .pad.r2c2 .pad-inner { background: var(--p-r2c2); --pad-glow: 0 0 24px var(--p-r2c2); }
    .pad.r2c3 .pad-inner { background: var(--p-r2c3); --pad-glow: 0 0 24px var(--p-r2c3); }
    .pad.r2c4 .pad-inner { background: var(--p-r2c4); --pad-glow: 0 0 24px var(--p-r2c4); }

    .features-section {
      width: 100%;
      max-width: 860px;
      margin: 0 auto 120px;
      padding: 0 24px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .feature {
      background: var(--bg);
      padding: 36px 32px;
      transition: background 0.2s;
    }
    .feature:hover { background: var(--surface); }

    .feature-num {
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.2em;
      margin-bottom: 18px;
      opacity: 0.7;
    }

    .feature h3 {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }

    .feature p {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.7;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    footer {
      width: 100%;
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
    }

    .footer-links { display: flex; gap: 28px; }

    footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--text); }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      nav { padding: 18px 20px; }
      .features { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 20px; text-align: center; }
      .footer-links { justify-content: center; }
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>

  <canvas id="glitter"></canvas>

  <nav id="nav">
    <a class="logo" href="/">Kraft<span>Pad</span></a>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <p class="eyebrow">For Mac · MIDI Controller</p>
    <h1>Your trackpad<br>is a <em>pad controller.</em></h1>
    <p class="subtitle">KraftPad turns your MacBook trackpad into a 15-pad MIDI controller. Play and perform with any DAW, no hardware required.</p>
    <div class="cta-row">
      <a class="badge" href="#">↓ App Store</a>
    </div>
  </section>

  <div class="grid-wrap">
<div class="pad-grid" id="padGrid">
      <div class="pad r0c0" data-r="0" data-c="0"><div class="pad-inner"></div></div>
      <div class="pad r0c1" data-r="0" data-c="1"><div class="pad-inner"></div></div>
      <div class="pad r0c2" data-r="0" data-c="2"><div class="pad-inner"></div></div>
      <div class="pad r0c3" data-r="0" data-c="3"><div class="pad-inner"></div></div>
      <div class="pad r0c4" data-r="0" data-c="4"><div class="pad-inner"></div></div>
      <div class="pad r1c0" data-r="1" data-c="0"><div class="pad-inner"></div></div>
      <div class="pad r1c1" data-r="1" data-c="1"><div class="pad-inner"></div></div>
      <div class="pad r1c2" data-r="1" data-c="2"><div class="pad-inner"></div></div>
      <div class="pad r1c3" data-r="1" data-c="3"><div class="pad-inner"></div></div>
      <div class="pad r1c4" data-r="1" data-c="4"><div class="pad-inner"></div></div>
      <div class="pad r2c0" data-r="2" data-c="0"><div class="pad-inner"></div></div>
      <div class="pad r2c1" data-r="2" data-c="1"><div class="pad-inner"></div></div>
      <div class="pad r2c2" data-r="2" data-c="2"><div class="pad-inner"></div></div>
      <div class="pad r2c3" data-r="2" data-c="3"><div class="pad-inner"></div></div>
      <div class="pad r2c4" data-r="2" data-c="4"><div class="pad-inner"></div></div>
    </div>
  </div>


  <footer>
    <div class="footer-links">
      <a href="/kraftpad/privacy">privacy</a>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.15 }
    );
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    const pattern = [
      [[2,0],[2,2]],
      [[2,2]],
      [[2,2],[1,1]],
      [[2,2]],
      [[2,1],[2,2]],
      [[2,2]],
      [[2,2],[0,4]],
      [[2,2]],
      [[2,0],[2,2]],
      [[2,2],[1,3]],
      [[2,0],[2,2]],
      [[2,2]],
      [[2,1],[2,2],[0,0]],
      [[2,2]],
      [[2,2],[1,2]],
      [[2,0],[2,2]],
    ];

    let step = 0;
    const pads = {};
    document.querySelectorAll('.pad').forEach(el => {
      pads[`${el.dataset.r},${el.dataset.c}`] = el;
      el.addEventListener('mousedown', () => triggerPad(el));
    });

    function triggerPad(el) {
      el.classList.add('hit');
      setTimeout(() => el.classList.remove('hit'), 160);
    }

    function tick() {
      pattern[step % pattern.length].forEach(([r, c]) => {
        const el = pads[`${r},${c}`];
        if (el) triggerPad(el);
      });
      step++;
    }

    setTimeout(() => setInterval(tick, 140), 1200);

    const canvas = document.getElementById('glitter');
    const ctx = canvas.getContext('2d');

    const colors = [
      '#4b32dc','#235af0','#1982fa','#0faff0','#0ac8e6',
      '#a023d7','#d223aa','#f0326e','#fa4b4b','#ff6428',
      '#d22332','#f05014','#ff8c00','#dcb400','#b4d200',
      '#59a6ff',
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : canvas.height + 10;
        this.vy = -(Math.random() * 0.6 + 0.2);
        this.vx = (Math.random() - 0.5) * 0.3;
        this.size = Math.random() * 1.8 + 0.4;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.life = 0;
        this.maxLife = Math.random() * 280 + 140;
        this.maxOpacity = Math.random() * 0.45 + 0.05;
        this.twinkleSpeed = Math.random() * 0.08 + 0.03;
        this.twinkleOffset = Math.random() * Math.PI * 2;
        this.rotate = Math.random() * Math.PI;
        this.rotateSpeed = (Math.random() - 0.5) * 0.02;
      }
      update() {
        this.life++;
        this.x += this.vx;
        this.y += this.vy;
        this.rotate += this.rotateSpeed;
        const p = this.life / this.maxLife;
        const fade = p < 0.15 ? p / 0.15 : p > 0.75 ? (1 - p) / 0.25 : 1;
        const twinkle = 0.7 + Math.sin(this.life * this.twinkleSpeed + this.twinkleOffset) * 0.3;
        this.opacity = this.maxOpacity * fade * twinkle;
        if (this.life >= this.maxLife) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotate);
        const s = this.size;
        ctx.fillRect(-s/2, -s/2, s, s);
        ctx.restore();
      }
    }

    const particles = Array.from({ length: 180 }, () => new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
